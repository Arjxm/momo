# JSON Formatter Skill
# A simple skill that formats and validates JSON

name = "json_formatter"
description = "Format and validate JSON strings. Can pretty-print JSON and check for syntax errors."
version = 1
language = "python"
entrypoint = "main.py"

[input_schema]
type = "object"
properties.json_string = { type = "string", description = "The JSON string to format" }
properties.indent = { type = "integer", description = "Indentation level (default: 2)", default = 2 }
required = ["json_string"]

[output_schema]
type = "object"
properties.formatted = { type = "string", description = "The formatted JSON" }
properties.valid = { type = "boolean", description = "Whether the JSON is valid" }
properties.error = { type = "string", description = "Error message if invalid" }

topics = ["json", "formatting", "validation"]
composes_with = ["web_fetch"]
