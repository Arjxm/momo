# Text Analyzer Skill
# Analyzes text for various statistics

name = "text_analyzer"
description = "Analyze text to get word count, character count, sentence count, and other statistics."
version = 1
language = "python"
entrypoint = "main.py"

[input_schema]
type = "object"
properties.text = { type = "string", description = "The text to analyze" }
required = ["text"]

[output_schema]
type = "object"
properties.word_count = { type = "integer" }
properties.char_count = { type = "integer" }
properties.char_count_no_spaces = { type = "integer" }
properties.sentence_count = { type = "integer" }
properties.paragraph_count = { type = "integer" }
properties.average_word_length = { type = "number" }
properties.top_words = { type = "array", items = { type = "object" } }

topics = ["text", "analysis", "statistics"]
composes_with = ["web_fetch", "arxiv_search"]
